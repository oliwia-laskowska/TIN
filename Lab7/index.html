<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edytor grafiki pikselowej</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      padding: 28px;
    }

    h1 {
      margin: 0 0 22px;
      text-align: center;
      font-size: 28px;
      color: #111827;
    }

    #toolbar,
    #info {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #f1f5f9;
      border: 1px solid #dbe3ee;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 18px;
    }

    #toolbar label,
    #info .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
    }

    #color-picker {
      width: 48px;
      height: 36px;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    #brush-size,
    button {
      height: 36px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #ffffff;
      color: #1e293b;
      padding: 0 12px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s, transform 0.2s;
    }

    button:hover {
      background: #e0e7ff;
      transform: translateY(-1px);
    }

    .canvas-wrap {
      display: flex;
      justify-content: center;
      margin: 22px 0;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(16, 24px);
      grid-template-rows: repeat(16, 24px);
      background: #cbd5e1;
      border: 3px solid #334155;
      border-radius: 8px;
      overflow: hidden;
    }

    .cell {
      width: 24px;
      height: 24px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      transition: filter 0.15s, background 0.15s;
    }

    .cell:hover {
      background: #fef3c7;
      filter: brightness(0.97);
    }

    #info {
      margin-bottom: 0;
    }

    #info span {
      min-width: 24px;
      display: inline-block;
      text-align: center;
      color: #0f172a;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 4px 8px;
    }
  </style>
</head>
<body>
<main class="app">
  <h1>Edytor grafiki pikselowej</h1>

  <div id="toolbar"></div>

  <div class="canvas-wrap">
    <div id="grid"></div>
  </div>

  <div id="info"></div>
</main>

<script>
 
  const grid = document.getElementById('grid');       // kontener siatki
  const toolbar = document.getElementById('toolbar'); // pasek narzędzi
  const info = document.getElementById('info');       // panel informacji

  // Rozmiar siatki
  const GRID_SIZE = 16;

  // Tworzenie siatki komórek
  for (let row = 0; row < GRID_SIZE; row++) {
    for (let col = 0; col < GRID_SIZE; col++) {
      const cell = document.createElement('div'); // tworzenie komórki
      cell.className = 'cell';                   // nadanie klasy CSS
      cell.dataset.row = row;                    // zapis numeru wiersza
      cell.dataset.col = col;                    // zapis numeru kolumny
      grid.appendChild(cell);                    // dodanie do siatki
    }
  }

  // Kolor
  const colorLabel = document.createElement('label');
  colorLabel.textContent = 'Kolor:'; // etykieta

  const colorPicker = document.createElement('input');
  colorPicker.type = 'color';        // input typu color
  colorPicker.id = 'color-picker';
  colorPicker.value = '#000000';     // domyślny kolor 

  colorLabel.appendChild(colorPicker); // dodanie inputa do labela
  toolbar.appendChild(colorLabel);     // dodanie do toolbaru

  // Rozmiar pędzla
  const brushLabel = document.createElement('label');
  brushLabel.textContent = 'Rozmiar pędzla:';

  const brushSize = document.createElement('select'); // lista rozwijana
  brushSize.id = 'brush-size';

  const brushOptions = ['1×1', '2×2', '3×3']; // dostępne rozmiary

  // Dodanie opcji do selecta
  for (let i = 0; i < brushOptions.length; i++) {
    const option = document.createElement('option');
    option.value = brushOptions[i];       // wartość opcji
    option.textContent = brushOptions[i]; // tekst widoczny
    brushSize.appendChild(option);
  }

  brushLabel.appendChild(brushSize);
  toolbar.appendChild(brushLabel);

  // Gumka
  const eraserButton = document.createElement('button');
  eraserButton.id = 'eraser-btn';
  eraserButton.textContent = 'Gumka'; 
  toolbar.appendChild(eraserButton);

  // Wyczyść
  const clearButton = document.createElement('button');
  clearButton.id = 'clear-btn';
  clearButton.textContent = 'Wyczyść';
  toolbar.appendChild(clearButton);

  // Panel informacji

  // Informacja o wierszu
  const rowInfo = document.createElement('div');
  rowInfo.className = 'info-item';
  rowInfo.textContent = 'Wiersz:';

  const infoRow = document.createElement('span');
  infoRow.id = 'info-row';
  infoRow.textContent = '–'; 
  rowInfo.appendChild(infoRow);
  info.appendChild(rowInfo);

  // Informacja o kolumnie
  const colInfo = document.createElement('div');
  colInfo.className = 'info-item';
  colInfo.textContent = 'Kolumna:';

  const infoCol = document.createElement('span');
  infoCol.id = 'info-col';
  infoCol.textContent = '–';
  colInfo.appendChild(infoCol);
  info.appendChild(colInfo);

  // Liczba aktywnych komórek
  const countInfo = document.createElement('div');
  countInfo.className = 'info-item';
  countInfo.textContent = 'Aktywne komórki:';

  const infoCount = document.createElement('span');
  infoCount.id = 'info-count';
  infoCount.textContent = '0'; 
  countInfo.appendChild(infoCount);
  info.appendChild(countInfo);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edytor grafiki pikselowej</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #1f2937;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      padding: 28px;
    }

    h1 {
      margin: 0 0 22px;
      text-align: center;
      font-size: 28px;
      color: #111827;
    }

    #toolbar,
    #info {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #f1f5f9;
      border: 1px solid #dbe3ee;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 18px;
    }

    #toolbar label,
    #info .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
    }

    #color-picker {
      width: 48px;
      height: 36px;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    #brush-size,
    button {
      height: 36px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #ffffff;
      color: #1e293b;
      padding: 0 12px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: background 0.2s, transform 0.2s;
    }

    button:hover {
      background: #e0e7ff;
      transform: translateY(-1px);
    }

    button.active {
      background: #fecaca;
      border-color: #ef4444;
      color: #7f1d1d;
    }

    .canvas-wrap {
      display: flex;
      justify-content: center;
      margin: 22px 0;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(var(--grid-size), 24px);
      grid-template-rows: repeat(var(--grid-size), 24px);
      background: #cbd5e1;
      border: 3px solid #334155;
      border-radius: 8px;
      overflow: hidden;
      user-select: none;
    }

    .cell {
      width: 24px;
      height: 24px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      transition: filter 0.15s, background 0.15s;
    }

    .cell:hover {
      background: #fef3c7;
      filter: brightness(0.97);
    }

    #info {
      margin-bottom: 0;
    }

    #info span {
      min-width: 24px;
      display: inline-block;
      text-align: center;
      color: #0f172a;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 4px 8px;
    }
  </style>
</head>

<body>
<main class="app">
  <h1>Edytor grafiki pikselowej</h1>

  <div id="toolbar"></div>

  <div class="canvas-wrap">
    <div id="grid"></div>
  </div>

  <div id="info"></div>
</main>

<script>
  // Pobranie głównych elementów
  const grid = document.getElementById('grid');
  const toolbar = document.getElementById('toolbar');
  const info = document.getElementById('info');

  // Stałe
  const GRID_SIZE = 16;
  const WHITE = '#ffffff';


  let activeColor = '#000000';      // aktualnie wybrany kolor rysowania
  let brushValue = 1;               // aktualny rozmiar pędzla: 1, 2 lub 3
  let isDrawing = false;            // WYMAGANIE: flaga rysowania myszą
  let isEraser = false;             // tryb gumki
  let skipNextClick = false;        // zabezpieczenie przed podwójnym kolorowaniem po mousedown

  // Ustawienie rozmiaru siatki w CSS
  grid.style.setProperty('--grid-size', GRID_SIZE);


  // Każda komórka dostaje data-row i data-col, żeby później odczytać jej pozycję
  for (let row = 0; row < GRID_SIZE; row++) {
    for (let col = 0; col < GRID_SIZE; col++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = row;
      cell.dataset.col = col;
      cell.style.backgroundColor = WHITE;
      grid.appendChild(cell);
    }
  }

  // Utworzenie kontrolki wyboru koloru
  const colorLabel = document.createElement('label');
  colorLabel.textContent = 'Kolor:';

  const colorPicker = document.createElement('input');
  colorPicker.type = 'color';
  colorPicker.id = 'color-picker';
  colorPicker.value = activeColor;

  colorLabel.appendChild(colorPicker);
  toolbar.appendChild(colorLabel);

  // Utworzenie listy wyboru rozmiaru pędzla
  const brushLabel = document.createElement('label');
  brushLabel.textContent = 'Rozmiar pędzla:';

  const brushSize = document.createElement('select');
  brushSize.id = 'brush-size';

  const brushOptions = ['1×1', '2×2', '3×3'];

  for (let i = 0; i < brushOptions.length; i++) {
    const option = document.createElement('option');
    option.value = String(i + 1);
    option.textContent = brushOptions[i];
    brushSize.appendChild(option);
  }

  brushLabel.appendChild(brushSize);
  toolbar.appendChild(brushLabel);

  // Utworzenie przycisku gumki
  const eraserButton = document.createElement('button');
  eraserButton.id = 'eraser-btn';
  eraserButton.textContent = 'Gumka';
  toolbar.appendChild(eraserButton);

  // Utworzenie przycisku czyszczenia siatki
  const clearButton = document.createElement('button');
  clearButton.id = 'clear-btn';
  clearButton.textContent = 'Wyczyść';
  toolbar.appendChild(clearButton);

  // Panel informacyjny - wiersz
  const rowInfo = document.createElement('div');
  rowInfo.className = 'info-item';
  rowInfo.textContent = 'Wiersz:';

  const infoRow = document.createElement('span');
  infoRow.id = 'info-row';
  infoRow.textContent = '–';

  rowInfo.appendChild(infoRow);
  info.appendChild(rowInfo);

  // Panel informacyjny - kolumna
  const colInfo = document.createElement('div');
  colInfo.className = 'info-item';
  colInfo.textContent = 'Kolumna:';

  const infoCol = document.createElement('span');
  infoCol.id = 'info-col';
  infoCol.textContent = '–';

  colInfo.appendChild(infoCol);
  info.appendChild(colInfo);

  // Panel informacyjny - licznik aktywnych komórek
  const countInfo = document.createElement('div');
  countInfo.className = 'info-item';
  countInfo.textContent = 'Aktywne komórki:';

  const infoCount = document.createElement('span');
  infoCount.id = 'info-count';
  infoCount.textContent = '0';

  countInfo.appendChild(infoCount);
  info.appendChild(countInfo);

  // delegacja zdarzeń
  // Zdarzenia są podpięte do #grid, a komórka jest rozpoznawana przez event.target
  function getCellFromEvent(event) {
    if (event.target.classList.contains('cell')) {
      return event.target;
    }

    return null;
  }

  // Funkcja aktualny kolor:
  // jeśli gumka jest aktywna, zwraca biały, w innym przypadku wybrany kolor
  function getCurrentColor() {
    if (isEraser) {
      return WHITE;
    }

    return activeColor;
  }

  // Pobranie konkretnej komórki po numerze wiersza i kolumny
  function getCell(row, col) {
    return grid.querySelector(`[data-row="${row}"][data-col="${col}"]`);
  }

  // Kolorowanie pojedynczej komórki
  function colorSingleCell(cell, color = getCurrentColor()) {
    if (!cell) {
      return;
    }

    cell.style.backgroundColor = color;
  }

  // rysowanie z rozmiarem pędzla 1x1, 2x2, 3x3
  function colorWithBrush(cell) {
    if (!cell) {
      return;
    }

    const startRow = Number(cell.dataset.row);
    const startCol = Number(cell.dataset.col);

    for (let row = startRow; row < startRow + brushValue; row++) {
      for (let col = startCol; col < startCol + brushValue; col++) {
        if (row < GRID_SIZE && col < GRID_SIZE) {
          colorSingleCell(getCell(row, col));
        }
      }
    }

    // aktualizacja licznika
    updateActiveCount();
  }

  // dblclick - wypełnienie całego wiersza aktywnym kolorem
  function fillRow(cell) {
    if (!cell) {
      return;
    }

    const row = Number(cell.dataset.row);

    for (let col = 0; col < GRID_SIZE; col++) {
      colorSingleCell(getCell(row, col));
    }

    updateActiveCount();
  }

  // contextmenu - czyszczenie pojedynczej komórki do białego koloru
  function clearCell(cell) {
    colorSingleCell(cell, WHITE);
    updateActiveCount();
  }

  //  clear-btn oraz klawisz C - czyszczenie całej siatki
  function clearGrid() {
    const cells = document.querySelectorAll('.cell');

    cells.forEach(function(cell) {
      cell.style.backgroundColor = WHITE;
    });

    updateActiveCount();
  }

  //  panel info-row i info-col aktualizowany przy mouseover
  function updateInfo(cell) {
    if (!cell) {
      return;
    }

    infoRow.textContent = Number(cell.dataset.row) + 1;
    infoCol.textContent = Number(cell.dataset.col) + 1;
  }

  //  info-count zlicza komórki, których tło różni się od białego
  function updateActiveCount() {
    const cells = document.querySelectorAll('.cell');
    let count = 0;

    cells.forEach(function(cell) {
      const color = cell.style.backgroundColor;

      if (color !== 'rgb(255, 255, 255)' && color !== WHITE && color !== '') {
        count++;
      }
    });

    infoCount.textContent = count;
  }

  //  tryb gumki - przełączanie oraz zmiana wyglądu przycisku
  function toggleEraser() {
    isEraser = !isEraser;
    eraserButton.classList.toggle('active', isEraser);

    if (isEraser) {
      eraserButton.textContent = 'Gumka aktywna';
    } else {
      eraserButton.textContent = 'Gumka';
    }
  }

  //  skróty 1 / 2 / 3 zmieniają rozmiar pędzla
  function setBrushSize(size) {
    brushValue = size;
    brushSize.value = String(size);
  }

  //  addEventListener - mousedown na siatce rozpoczyna rysowanie
  grid.addEventListener('mousedown', function(event) {
    const cell = getCellFromEvent(event);

    if (!cell) {
      return;
    }

    isDrawing = true;
    skipNextClick = true;
    colorWithBrush(cell);
  });

  //  addEventListener - mousemove koloruje komórki, jeśli isDrawing jest true
  grid.addEventListener('mousemove', function(event) {
    const cell = getCellFromEvent(event);

    if (!cell) {
      return;
    }

    if (isDrawing) {
      colorWithBrush(cell);
    }
  });

  //  addEventListener - mouseover aktualizuje panel informacyjny
  grid.addEventListener('mouseover', function(event) {
    const cell = getCellFromEvent(event);
    updateInfo(cell);
  });

  //  addEventListener - dblclick wypełnia cały wiersz
  grid.addEventListener('dblclick', function(event) {
    const cell = getCellFromEvent(event);
    fillRow(cell);
  });

  //  addEventListener - contextmenu blokuje menu i czyści komórkę
  grid.addEventListener('contextmenu', function(event) {
    event.preventDefault();

    const cell = getCellFromEvent(event);
    clearCell(cell);
  });

  //  addEventListener - mouseup na document kończy rysowanie
  document.addEventListener('mouseup', function() {
    isDrawing = false;
  });

  //  addEventListener - keydown obsługuje skróty klawiaturowe
  document.addEventListener('keydown', function(event) {
    const key = event.key.toLowerCase();

    if (key === 'e') {
      toggleEraser();
    }

    if (key === 'c') {
      clearGrid();
    }

    if (key === '1') {
      setBrushSize(1);
    }

    if (key === '2') {
      setBrushSize(2);
    }

    if (key === '3') {
      setBrushSize(3);
    }
  });

  //  on-property - onclick na #grid
  // Click koloruje pojedynczą komórkę przez delegację zdarzeń
  grid.onclick = function(event) {
    const cell = getCellFromEvent(event);

    if (!cell) {
      return;
    }

    // Zapobiega drugiemu kolorowaniu po wcześniejszym mousedown
    if (skipNextClick) {
      skipNextClick = false;
      return;
    }

    colorSingleCell(cell);
    updateActiveCount();
  };

  //  on-property - oninput na color-picker
  // Kolor aktualizuje się na bieżąco
  colorPicker.oninput = function() {
    activeColor = colorPicker.value;
  };

  //  on-property - onchange na brush-size
  // Zmiana rozmiaru pędzla z listy
  brushSize.onchange = function() {
    brushValue = Number(brushSize.value);
  };

  //  on-property - onclick na przycisku gumki
  eraserButton.onclick = function() {
    toggleEraser();
  };

  //  on-property - onclick na przycisku czyszczenia
  clearButton.onclick = function() {
    clearGrid();
  };
</script>
</body>
</html>
